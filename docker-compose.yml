version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - STABILITY_API_KEY=${STABILITY_API_KEY}
      - FAL_API_KEY=${FAL_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
